version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: buktiin_db
    environment:
      POSTGRES_USER: buktiin_user
      POSTGRES_PASSWORD: buktiin_password
      POSTGRES_DB: buktiin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: buktiin_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
